  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      --color-text-secondary: #555;
      --color-text-tertiary: #888;
      --color-background-primary: #fff;
      --color-background-secondary: #f7f7f7;
      --color-border-primary: #333;
      --color-border-secondary: #ccc;
      --color-border-tertiary: #e5e5e5;
      --border-radius-md: 10px;
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-left: env(safe-area-inset-left, 0px);
      --safe-area-right: env(safe-area-inset-right, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-text-primary: #f5f5f5;
        --color-text-secondary: #bbb;
        --color-text-tertiary: #888;
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #2a2a2a;
        --color-border-primary: #888;
        --color-border-secondary: #555;
        --color-border-tertiary: #333;
      }
      .tag-cutback { background: #0F4F3A; color: #7FDCB8; }
      .tag-race { background: #5C2A14; color: #F8A888; }
      .tag-taper { background: #322E6B; color: #B4B0E8; }
      .tag-quality { background: #1A3A5C; color: #8CC4F8; }
      .b-run { background: #1A3A5C; color: #8CC4F8; }
      .b-strength { background: #0F4F3A; color: #7FDCB8; }
      .b-vo2 { background: #322E6B; color: #B4B0E8; }
      .b-long { background: #5C2A14; color: #F8A888; }
      .b-rest { background: #3a3a38; color: #a5a5a0; }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--color-background-primary); }
    body {
      margin: 0;
      padding: 0;
      background: var(--color-background-primary);
      font-family: var(--font-sans);
      -webkit-text-size-adjust: 100%;
    }
    .plan-wrap {
      padding: calc(var(--safe-area-top) + 1rem) calc(var(--safe-area-right) + 1rem) calc(var(--safe-area-bottom) + 1rem) calc(var(--safe-area-left) + 1rem);
      font-family: var(--font-sans);
      max-width: 800px;
      margin: 0 auto;
    }
    .phase-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--color-text-tertiary); margin: 1.5rem 0 .5rem; }
    .weeks-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }

    }
    @media (min-width: 640px) {
      .weeks-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    .week-card {
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      background: var(--color-background-primary);
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      min-height: 88px;
    }
    .week-card:active { transform: scale(0.98); }
    .week-card.active { border-color: var(--color-border-primary); background: var(--color-background-secondary); }
    .week-card.cutback { border-left: 3px solid #1D9E75; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
    .wk-num { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 4px; font-weight: 500; }
    .wk-dates { font-weight: 400; }
    .wk-miles { font-size: 20px; font-weight: 600; color: var(--color-text-primary); }
    .wk-miles span { font-size: 12px; font-weight: 400; color: var(--color-text-tertiary); }
    .wk-long { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
    .wk-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-top: 6px; font-weight: 600; }
    .tag-cutback { background: #E1F5EE; color: #0F6E56; }
    .tag-race { background: #FAECE7; color: #993C1D; }
    .tag-taper { background: #EEEDFE; color: #534AB7; }
    .tag-quality { background: #E6F1FB; color: #185FA5; }
    .detail-panel {
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 16px;
      margin-top: 16px;
      background: var(--color-background-primary);
    }
    .detail-title { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin: 0 0 4px; }
    .detail-subtitle { font-size: 14px; color: var(--color-text-secondary); margin: 0 0 14px; }
    .day-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: baseline;
      padding: 10px 0;
      border-top: 1px solid var(--color-border-tertiary);
      font-size: 14px;
    }
    .day-name {
      color: var(--color-text-secondary);
      font-weight: 600;
      min-width: 44px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .day-date {
      font-size: 11px;
      font-weight: 400;
      color: var(--color-text-tertiary);
    }
    .day-desc {
      color: var(--color-text-primary);
      line-height: 1.5;
      flex: 1 1 200px;
    }
    .day-miles {
      color: var(--color-text-tertiary);
      font-size: 13px;
      white-space: nowrap;
      font-weight: 500;
      margin-left: auto;
    }
    .day-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 6px; font-weight: 600; vertical-align: middle; }
    .b-run { background: #E6F1FB; color: #185FA5; }
    .b-strength { background: #E1F5EE; color: #0F6E56; }
    .b-vo2 { background: #EEEDFE; color: #534AB7; }
    .b-long { background: #FAECE7; color: #993C1D; }
    .b-rest { background: #F1EFE8; color: #5F5E5A; }

    /* Day completion tracking */
    .day-check {
      width: 24px;
      height: 24px;
      border: 2px solid var(--color-border-secondary);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .day-check:active { transform: scale(0.9); }
    .day-check.done {

      border-color: #1D9E75;
    }
    .day-check.done::after {

      color: white;
      font-size: 14px;
      font-weight: 700;
    }
    .day-row.completed .day-desc,
    .day-row.completed .day-miles,

    .legend { display: flex; flex-wrap: wrap; gap: 12px 16px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; }

    .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* Smooth scrolling for iOS */
    html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  </style>
</head>

const START_DATE = new Date(2026, 3, 20); // Month is 0-indexed (3 = April)

function getWeekDates(weekNum) {
  const weekStart = new Date(START_DATE);
  weekStart.setDate(weekStart.getDate() + (weekNum - 1) * 7);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const startMonth = months[weekStart.getMonth()];
  const endMonth = months[weekEnd.getMonth()];

  if (startMonth === endMonth) {
    return `${startMonth} ${weekStart.getDate()}–${weekEnd.getDate()}`;
  } else {
    return `${startMonth} ${weekStart.getDate()} – ${endMonth} ${weekEnd.getDate()}`;
  }
}

function getDayDate(weekNum, dayIndex) {
  const date = new Date(START_DATE);
  date.setDate(date.getDate() + (weekNum - 1) * 7 + dayIndex);
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${months[date.getMonth()]} ${date.getDate()}`;
}

// Simple localStorage tracking
const STORAGE_KEY = 'hm-plan-completed';
function getCompleted() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}
function setCompleted(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function toggleDay(weekNum, dayIndex) {
  const key = `w${weekNum}d${dayIndex}`;
  const completed = getCompleted();
  if (completed[key]) {
    delete completed[key];
  } else {
    completed[key] = true;
  }
  setCompleted(completed);
  return !!completed[key];
}

    card.className = 'week-card' + (wk.cutback ? ' cutback' : '');
    card.id = 'wk'+i;
    card.innerHTML = `<div class="wk-num">Week ${wk.w} <span class="wk-dates">· ${getWeekDates(wk.w)}</span></div><div class="wk-miles">${wk.total} <span>run mi</span></div><div class="wk-long">Long: ${wk.long} mi</div>${tagHTML(wk.tag)}`;
    card.addEventListener('click', () => toggle(i, card));
    grid.appendChild(card);
  }
});

function toggle(i, card) {
  const panel = document.getElementById('detail');
  document.querySelectorAll('.week-card').forEach(c => c.classList.remove('active'));
  if (activeWeek === i) { activeWeek = null; panel.style.display = 'none'; return; }
  activeWeek = i;
  card.classList.add('active');
  const wk = W[i];
  const completed = getCompleted();
  panel.style.display = 'block';
  panel.innerHTML = `<div class="detail-title">Week ${wk.w} · ${getWeekDates(wk.w)}</div><div class="detail-subtitle">${wk.total} running miles</div>` +
    wk.days.map(([day,desc,mi,type], idx) => {
      const key = `w${wk.w}d${idx}`;
      const isDone = completed[key];
      const dayDate = getDayDate(wk.w, idx);
      return `<div class="day-row${isDone ? ' completed' : ''}" data-week="${wk.w}" data-day="${idx}">
        <div class="day-check${isDone ? ' done' : ''}"></div>
        <span class="day-name">${day}<span class="day-date">${dayDate}</span></span>
        <span class="day-desc"><span class="day-badge ${badgeClass[type]}">${badgeLabel[type]}</span>${desc}</span>
        <span class="day-miles">${mi}</span>
      </div>`;
    }).join('');

  // Add click handlers for checkboxes
  panel.querySelectorAll('.day-check').forEach(check => {
    check.addEventListener('click', (e) => {
      e.stopPropagation();
      const row = check.closest('.day-row');
      const weekNum = parseInt(row.dataset.week);
      const dayIdx = parseInt(row.dataset.day);
      const nowDone = toggleDay(weekNum, dayIdx);
      check.classList.toggle('done', nowDone);
      row.classList.toggle('completed', nowDone);
    });
  });

  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

const colors = W.map(w => w.tag==='race' ? '#D85A30' : (w.cutback||w.tag==='cutback') ? '#1D9E75' : '#378ADD');
new Chart(document.getElementById('mc'), {
  type:'bar',
  data:{ labels: W.map(w=>'W'+w.w), datasets:[{data:W.map(w=>w.total), backgroundColor:colors, borderRadius:3, borderSkipped:false}] },
  options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.parsed.y+' mi'}}},
    scales:{
      x:{ticks:{font:{size:10},autoSkip:true,maxRotation:0,color:'#888780'},grid:{display:false}},
      y:{ticks:{font:{size:10},color:'#888780'},grid:{color:'rgba(136,135,128,0.1)'}}
    }
  }
});
</script>
</body>
</html>
